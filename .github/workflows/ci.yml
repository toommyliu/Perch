name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Analyze and Test
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Print toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcode-select -p

      - name: Analyze
        run: |
          xcodebuild analyze \
            -project Perch.xcodeproj \
            -scheme Perch \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          mkdir -p TestResults
          xcodebuild test \
            -project Perch.xcodeproj \
            -scheme Perch \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults/Perch.xcresult

      - name: Upload test result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Perch.xcresult
          path: TestResults/Perch.xcresult
          if-no-files-found: ignore
